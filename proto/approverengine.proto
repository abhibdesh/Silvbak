syntax = "proto3";
package Silvbak;
option go_package = "proto/gen/approver";

service ApproverEngine {
    rpc ApproveRecord(ApprovalRequest) returns (ApprovalResponse);
}

message ApprovalRequest {   // cleaner than reusing the rpc name
    string data = 1;
}

message ApprovalResponse {
    string response = 1;
}